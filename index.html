<!DOCTYPE html>
<html>
<head>
    <title>Study Hub 📚</title>

    <!-- IMPORTANT FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .screen {
            display: none;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .active {
            display: block;
        }

        h1 {
            text-align: center;
            font-size: 28px;
        }

        .card {
            background: #1e293b;
            padding: 18px;
            margin: 12px 0;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
        }

        .card:hover {
            background: #334155;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: lime;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        #timer {
            text-align: center;
            font-size: 22px;
            margin-top: 20px;
        }
    </style>
</head>
‎
‎<body>
‎
‎<!-- HOME -->
‎<div id="home" class="screen active">
‎    <h1>📚 Study Hub</h1>
‎
‎    <div class="card" onclick="enterGrade('10')">🔼 Grade 10</div>
‎    <div class="card" onclick="enterGrade('11')">🔽 Grade 11</div>
‎</div>
‎
‎<!-- TIMETABLE -->
‎<div id="timetable" class="screen">
‎    <h1 id="gradeTitle"></h1>
‎
‎    <h2>🕒 Timetable</h2>
‎    <p id="timetableText"></p>
‎
‎    <button onclick="goSubjects()">Continue</button>
‎</div>
‎
‎<!-- SUBJECTS -->
‎<div id="subjects" class="screen">
‎    <h1 id="subjectTitle"></h1>
‎
‎    <div id="subjectList"></div>
‎</div>
‎
‎<!-- SCHEME -->
‎<div id="scheme" class="screen">
‎    <h1 id="schemeTitle"></h1>
‎
‎    <p id="schemeText"></p>
‎
‎    <button onclick="startLesson()">Continue</button>
‎</div>
‎
‎<!-- LESSON -->
‎<div id="lesson" class="screen">
‎    <h1 id="lessonTitle"></h1>
‎
‎    <p id="lessonContent"></p>
‎
‎    <h2 id="timer">⏱ 60:00</h2>
‎
‎    <button onclick="tryExit()">Exit</button>
‎</div>
‎
<script>
let grade = "";
let subject = "";
let timeLeft = 3600;
let timerInterval;
let canExit = false;

// SCREEN SWITCH
function show(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screen).classList.add('active');
}

// HOME → GRADE
function enterGrade(g) {
    grade = g;

    document.getElementById("gradeTitle").innerText = "Grade " + g;

    let timetable = (g === "10")
        ? "Grade 10 Timetable (edit this)"
        : "Grade 11 Timetable (edit this)";

    document.getElementById("timetableText").innerText = timetable;

    show("timetable");
}

// TIMETABLE → SUBJECTS
function goSubjects() {
    document.getElementById("subjectTitle").innerText = "Grade " + grade;

    let list = document.getElementById("subjectList");
    list.innerHTML = "";

    let subjects = (grade === "10")
        ? ["Math", "Biology", "English"]
        : ["Physics", "Chemistry", "Economics"];

    subjects.forEach(s => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerText = s;
        div.onclick = () => selectSubject(s);
        list.appendChild(div);
    });

    show("subjects");
}

// SUBJECT → SCHEME
function selectSubject(s) {
    subject = s;

    document.getElementById("schemeTitle").innerText = s;
    document.getElementById("schemeText").innerText =
        s + " Scheme of Work (you will edit this)";

    show("scheme");
}

// START LESSON
function startLesson() {
    timeLeft = 3600;
    canExit = false;

    document.getElementById("lessonTitle").innerText = subject;

    document.getElementById("lessonContent").innerText =
        subject + "🔢 TOPIC 1: ALGEBRAIC FRACTIONS (RATIONAL EXPRESSIONS)

    show("lesson");
    startTimer();
}

// TIMER
function startTimer() {
    clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        timeLeft--;

        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;

        document.getElementById("timer").innerText =
            "⏱ " + m + ":" + (s < 10 ? "0" : "") + s;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            canExit = true;
            alert("Lesson completed 🎉");
            show("subjects");
        }
    }, 1000);
}

// EXIT CONTROL
function tryExit() {
    if (!canExit) {
        alert("❌ You must finish the 1 hour lesson!");
    } else {
        show("subjects");
    }
}
</script>
‎
‎</body>
‎</html>
