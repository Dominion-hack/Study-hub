<h3>🧬 MICRO ORGANISMS AROUND US</h3>
<p>REFRENCE MOREDERN BIOLOGY FOR SENIOR SECONDARY SCHOOLS</p>
<h3>MICRO ORGANISMS AROUND US</h3>
<p>Description and Groups of Micro organisms
Concept of Culturing
Identification of Microorganisms
Carriers of Microorganisms
 
DESCRIPTION AND GROUS OF MICRO ORGANISMS
Micro-organisms otherwise called microbes or germs can be defined as living things which cannot be seen with unaided eye but by the use of  microscopes.
Binoculars, Telescopes & Optical Devices
 They exist almost everywhere, in water, air, soil, surface of objects, as well as on and within living organisms.  They are carried by air currents from the earth’s surface to the upper atmosphere. They occur most abundantly where there is food, moisture and adequate temperature for their growth. 
It was the invention of  microscope that opened the gateway to the world of these minute living organisms. The first person to discover microbes was a Dutch man called Anthony Leeuwenhoek ( 1632-1723 ). Using a simple microscope, he was astonished to discover that rain water that had been collected from pools was full of little organisms.
GROUPS OF MICRO-ORGANISMS
Micro-organisms include all viruses, bacteria and the protists. Others are the cyanobacteria, certain fungi and algae. 
 
BACTERIA: These are minute unicellular organisms or simple association of similar cells which multiply by binary fission. Most bacteria cells range between 0.2 µ-2µ in diameter and 0.0005mm-0.002mm long. Each bacterium cell has a cell wall with cytoplasm. There is no well defined nucleus. Consequently, they are prokaryotic organisms. 
 
There are different kinds of bacteria showing a range of shapes. Certain kinds of bacteria have long thread-like structures called flagella which assist in locomotion. Bacteria with spherical shape are referred to as cocci (singular-coccus). There are several forms as shown on the next page.
Streplococci- These are arranged in chains. They cause sore throat.
Staphylococci- These stick together to form irregular bunches. They cause boils.
Diplococci- They occurs in pairs. e.g. pneumococci which causes pneumonia.
Bacilli- They is rod-shaped. They cause typhoid fever.
Spirilla (singular = spirillum)- These are rod-shaped bacteria twisted into a spiral shape. 
Spirochaetes- These are also spiral in shape but are more flexible and slender with helically coiled structure e.gTreponemapallidum which causes syphilis.
Vibrios- These are comma-shaped bacteria e.gVibriocholera which causes cholera.
 
 VIRUSES: Viruses are a large group of pathogens whose presence is felt only when they are in contact with living cells. They are very small and vary between 0.1µ-0.25 µ in diameter. The largest virus is less than one-fourth the size of typhoid bacterium.
 
A virus consists of a nuclear material either DNA or RNA, enclosed within a protein coat. Outside living organisms they are like complex chemicals.
 
PROTISTS: These are single-celled animals, mostofwhich are only visible by means of microscope. They are common in fresh water and moist soils. Examples include Euglena, Paramecium, Trypanosoma, Plasmodium, etc.
Binoculars, Telescopes & Optical Devices
FUNGI: They are diversified in form. The blue and green growth on oranges, lemons, cheese and the white/grey growth on bread are usually signs of fungal infections. Fungi feed saprophytically. Examples of fungi include Mucor, Rhizopus, Penicillium, Aspergillus, etc.
ALGAE: Most algae are unicellular and very small. They have chlorophyll. They occur abundantly in water, moist soils, bark of trees, stones, etc. Free floating  microscopic algae are referred to as phytoplanktonsand they form the major food of aquatic animals.Examples of unicellular algae include Chlamydomonas and Protococcus.
 ￼

What are microorganisms
List five groups of microorganisms with two examples each
 
CONCEPT OF CULTURING
A pre-requisite to studying microbes is their cultivation under laboratory conditions. Hence, it is important to know the nutrients and physical conditions needed by the organisms. 
It is easier to grow bacteria, fungi, and algae in appropriate media. The material on or in which microbes grow in the laboratory is called culture medium. Some media are prepared from complex extracts of plant or animal tissues. A culture is the population of organisms cultivated in a medium.  
Flora & Fauna
If a culture contains only one living species of organism regardless of the number of individuals, it is said to be a pure or axenic culture. A culture which contains two or more species growing together is called a mixed culture.
An important medium used for growing microbes is agar. It is a dried polysaccharide extract of red algae which is used as a solidifying agent. It is not broken down by microbes.
EVALUATION
What is a culture medium?
Differentiate between axenic and mixed culture
 
IDENTIFICATION OF MICRO-ORGANISMS
There are many ways of identifying micro-organisms around us. These include the use of  microscopes stains of different types, types of colonies formed by the microbes, their food requirement and oxygen requirement of the organisms.
To determine the presence of microbes around us, suitable media are used to culture them in  petri-dishes which are first sterilized by heating them in a pressure cooker, autoclave or oven. 
Micro-organisms are not capable of growing in the air. The exposure of nutrient agar to the air will show the growth of different bacteria colonies in the air. Microbes commonly found in the air include viruses, bacteria, fungi, etc.
Scientific Equipment
Microbes in aquatic habitat may be grouped into natural water, soil and sewage microbes. Examples of the first category include protists, algae, some fungi,bacteria, etc. Examples of the second group include Rhizobium, Nitrosomonas, and Nitrobacter.  Examples of sewage microbes are Entamoebahistolytica, Escherichia coli, etc.
Microbes living in our bodies form normal population without causing any harm. However, under certain conditions, they may become dangerous. Pathogenic organisms cause diseases when body resistance is low or when normal microflora is de-established by the use of antibiotics. Any food item left unpreserved for a long time will be spoilt by the activities of microbes. 
Pathogens enter the body through four main ways, namely: air, food and water, contact (direct or indirect), and insect bites/cuts. 
EVALUATION
Give two examples each of soil and sewage microorganisms

CARRIERS OF MICROORGANISM 
Any agent that carries microbes from one place to another is called a carrier. Carriers can be living or non-living things. Non-living carriers include air, water, and food while animals (e.g. houseflies, mosquitoes, rats, cats, etc) are the living carriers. Animal vectors carry pathogens either mechanically or biologically. In mechanical method, animals carry the pathogens on their bodies where they cannot grow or multiply. In biological method, the vector becomes infected by feeding on the body fluid of infected persons or animals.

lesson:`
<h3>🧬 EXCRETORY SYSTEM</h3>
<p>REFRENCE MOREDERN BIOLOGY FOR SENIOR SECONDARY SCHOOLS BY S.T RAMALINGAM</p>

<h3>MEANING OF EXCRETORY SYSTEM AND EXPLANATION</h3>
<p>Excretion is the process by which metabolic waste products are removed from the body of all living things. Excretion is different from egestion which is the removal of solid waste (undigested food substances i.e.faeces) through the anus. Excretion is necessary for the following reasons:
To avoid or prevent any harm that would be caused by any excretory product.
Some excretory products are poisonous to the body and should be removed.
To maintain water balance in the body (homeostasis).
To avoid interference of waste products with normal metabolic activities in the body.
EVALUATION
List five excretory structures adapted to aquatic habitat
Mention four excretory waste in plants
TYPES OF EXCRETORY SYSTEMS
CONTRACTILE VACUOLE IN PROTOZOA
Contractile vacuole is a simple structure found in the cell of fresh water protozoa. Water constantly enters the cell of a protozoan through the selectively permeable membrane because the cell is hypertonic to its environment. As water enters the cell, a contractile vacuole is formed which collects the water and expands, when it reaches the maximum size, it contracts and discharges the water through a temporary break in the cell membrane at interval. Excretion of carbon dioxide and ammonia is by diffusion through the cell membrane
FLAME CELL IN FLATWORMS
The excretory system consists of two longitudinal canals with branched tubules which end in flame cells. The flame cell has a large hollow called the cell lumen with bunch of flagella hung on it. Waste product from the surrounding cells enters the flame cells. The flagella help to propel the fluid into the tubules. The fluid passes into the exterior through a narrow tube called duct.
NEPHRIDIUM IN EARTHWORM
A pair of nephridia is found on each segment of the earthworm except the three and the last. Each nephridium consists of a ciliated funnel, nephrostome which leads into a long coiled tube (narrow and middle ciliated tubes, wide non-ciliated tubes and muscular tube). The tube opens to the exterior as nephriodiophore (excretory pore). Waste product mainly urea is absorbed from blood capillaries surrounding the nephridia. The fluid containing the waste through the long tube of the nephridia, salt and other useful substances are reabsorbed through the wall of the tube. The unabsorbed substances and water gather in the muscular tube and discharge to the exterior through the excretory pore.
EVALUATION
How are excretory products removed in amoeba and earthworm?
Describe the excretory structure in flatworm.
MALPIGHIAN TUBULE IN INSECT
Malpighian tubules are found between the
midgut (small intestine) and the hindgut (large intestine). One end opens into the gut while the other end closed freely floats in the haemocoel. Nitrogenous waste and water in the haemocoel are absorbed at the distal close end into the tubule. The waste is converted into uric acid as it passes along the malpighian tubule towards the gut. A lot of water is also reabsorbed so that by the time the uric acid reaches the proximal end, it is changed to solid crystals. More water is reabsorbed in the rectum therefore concentrated urine leaves the body as almost dried solid.
GENERAL EVALUATION
Define excretion.
Explain the necessity for an excretory system in animals.
Describe the mechanism of excretion in insects.
List five excretory product in plants.
Differentiate between excretion and egestion.

// NAVIGATION
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function enterGrade(g){
grade=g;
document.getElementById("gradeTitle").innerText="Grade "+g;
document.getElementById("timetableText").innerText="Timetable for Grade "+g;
show("timetable");
}

function goSubjects(){
let subs=Object.keys(data[grade].subjects);
let box=document.getElementById("subjectList");
box.innerHTML="";

document.getElementById("subjectTitle").innerText="Grade "+grade;

subs.forEach(s=>{
let d=document.createElement("div");
d.className="card";
d.innerText=s;
d.onclick=()=>selectSubject(s);
box.appendChild(d);
});

show("subjects");
}

function selectSubject(s){
subject=s;
document.getElementById("schemeTitle").innerText=s;
document.getElementById("schemeText").innerText=data[grade].subjects[s].scheme;
show("scheme");
}

function startLesson(){
timeLeft=3600;
document.getElementById("lessonTitle").innerText=subject;
document.getElementById("lessonContent").innerHTML=data[grade].subjects[subject].lesson;
show("lesson");
startTimer();
}

function startTimer(){
clearInterval(timer);
timer=setInterval(()=>{
timeLeft--;
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("timer").innerText="⏱ "+m+":"+(s<10?"0":"")+s;

if(timeLeft<=0){
clearInterval(timer);
alert("Lesson complete 🎉");
show("subjects");
}
},1000);
}

function showQuiz(){
show("quiz");
document.getElementById("quizQuestion").innerText=data[grade].subjects[subject].quiz.q;
}

function checkAnswer(){
let ans=document.getElementById("answer").value.toLowerCase();
let correct=data[grade].subjects[subject].quiz.a.toLowerCase();

if(ans==correct){
alert("Correct 🎉");
show("subjects");
}else{
alert("Wrong 😭");
}
}
</script>
