<!DOCTYPE html>
<html>
<head>
    <title>Study Hub 📚</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .screen {
            display: none;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .active {
            display: block;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 18px;
            margin: 12px 0;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
        }

        .card:hover {
            background: #334155;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: lime;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        #timer {
            text-align: center;
            font-size: 22px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
    <h1>📚 Study Hub</h1>
    <div class="card" onclick="enterGrade('10')">🔼 Grade 10</div>
    <div class="card" onclick="enterGrade('11')">🔽 Grade 11</div>
</div>

<!-- TIMETABLE -->
<div id="timetable" class="screen">
    <h1 id="gradeTitle"></h1>
    <p id="timetableText"></p>
    <button onclick="goSubjects()">Continue</button>
</div>

<!-- SUBJECTS -->
<div id="subjects" class="screen">
    <h1 id="subjectTitle"></h1>
    <div id="subjectList"></div>
</div>

<!-- SCHEME -->
<div id="scheme" class="screen">
    <h1 id="schemeTitle"></h1>
    <p id="schemeText"></p>
    <button onclick="startLesson()">Continue</button>
</div>

<!-- LESSON -->
<div id="lesson" class="screen">
    <h1 id="lessonTitle"></h1>
    <p id="lessonContent"></p>
    <h2 id="timer">⏱ 60:00</h2>
    <button onclick="tryExit()">Exit</button>
</div>

<script>
let grade = "";
let subject = "";
let timeLeft = 3600;
let timerInterval;
let canExit = false;

// SWITCH SCREEN
function show(id) {
    document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// SELECT GRADE
function enterGrade(g) {
    grade = g;

    document.getElementById("gradeTitle").innerText = "Grade " + g;
    document.getElementById("timetableText").innerText =
        "This is timetable for Grade " + g + " (edit it)";

    show("timetable");
}

// GO SUBJECTS
function goSubjects() {
    let subjects = (grade === "10")
        ? ["Math", "Biology", "English"]
        : ["Physics", "Chemistry", "Economics"];

    let container = document.getElementById("subjectList");
    container.innerHTML = "";

    document.getElementById("subjectTitle").innerText =
        "Grade " + grade + " Subjects";

    subjects.forEach(sub => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerText = sub;
        div.onclick = () => selectSubject(sub);
        container.appendChild(div);
    });

    show("subjects");
}

// SELECT SUBJECT
function selectSubject(sub) {
    subject = sub;

    document.getElementById("schemeTitle").innerText = sub;
    document.getElementById("schemeText").innerText =
        sub + "https://lessonplan.edudelight.com/third-term-scheme-of-work-for-physics-ss2-2/";

    show("scheme");
}

// START LESSON
function startLesson() {
    timeLeft = 3600;
    canExit = false;

    document.getElementById("lessonTitle").innerText = subject;
    document.getElementById("lessonContent").innerText =
        subject + "🔢 TOPIC 1: ALGEBRAIC FRACTIONS (RATIONAL EXPRESSIONS)

    show("lesson");
    startTimer();
}

// TIMER
function startTimer() {
    clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        timeLeft--;

        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;

        document.getElementById("timer").innerText =
            "⏱ " + m + ":" + (s < 10 ? "0" : "") + s;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            canExit = true;
            alert("Lesson complete 🎉");
            show("subjects");
        }
    }, 1000);
}

// EXIT CONTROL
function tryExit() {
    if (!canExit) {
        alert("❌ Finish the 1 hour lesson!");
    } else {
        show("subjects");
    }
}
</script>

</body>
</html>
